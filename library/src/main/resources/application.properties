spring.application.name=library
server.port=8081

# Load .env from project root (for BREVO_API_KEY etc.)
# dotenv.directory=..
# dotenv.filename=.env

# Database (H2 embedded for local dev)
# To use PostgreSQL: set SPRING_DATASOURCE_URL as a system env variable before running
spring.datasource.url=jdbc:h2:file:./data/librarydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jackson.serialization.write-dates-as-timestamps=false

# Mail Configuration
brevo.api.key=1234
mail.from=bcoelibrary@gmail.com